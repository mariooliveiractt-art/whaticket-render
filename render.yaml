services:
  # Backend
  - type: web
    name: whaticket-backend
    env: node
    plan: free
    region: oregon
    rootDirectory: backend
    buildCommand: npm install && npm run build
    startCommand: npx sequelize db:migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_DIALECT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: whaticket-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

  # Frontend
  - type: web
    name: whaticket-frontend
    runtime: static
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: NODE_OPTIONS
        value: --openssl-legacy-provider


databases:
  - name: whaticket-db
    plan: free
    region: oregon
